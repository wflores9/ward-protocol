name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# No default permissions — each job declares its own
permissions: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify with twine
        run: python -m twine check dist/*

      - name: Smoke test the wheel
        run: |
          pip install dist/*.whl
          python -c "import ward; print('ward version:', ward.__version__)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-artifacts
          path: dist/
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/ward-protocol/

    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-artifacts
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          verbose: true

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist-artifacts
          path: dist/

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Get test summary
        id: tests
        run: |
          pip install pytest pytest-asyncio xrpl-py pydantic httpx anyio[trio] --quiet 2>/dev/null || true
          COUNT=$(pytest test_ward.py -m "not integration" -q --no-header 2>/dev/null | tail -1 || echo "See test results")
          echo "SUMMARY=$COUNT" >> $GITHUB_OUTPUT

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.TAG }}"
          VERSION_NUM="${VERSION#v}"
          NOTES=$(python3 -c "
          import re
          content = open('CHANGELOG.md').read()
          pattern = r'\[' + re.escape('$VERSION_NUM') + r'\].*?(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          print(match.group(0).strip() if match else 'See CHANGELOG.md for details.')
          " 2>/dev/null || echo "See CHANGELOG.md for details.")
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "Ward Protocol ${{ steps.tag.outputs.TAG }}"
          body: |
            ${{ steps.changelog.outputs.NOTES }}

            ---
            ${{ steps.tests.outputs.SUMMARY }}

            `pip install ward-protocol==${{ steps.tag.outputs.TAG }}`
          files: dist/*
          draft: false
          prerelease: false
