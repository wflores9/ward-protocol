name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Triggers on any tag like v0.2.3, v1.0.0

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify with twine
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ward-protocol/

    permissions:
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required to create releases

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Read changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.TAG }}"
          VERSION_NUM="${VERSION#v}"
          # Extract changelog section for this version
          NOTES=$(python3 -c "
          import re, sys
          content = open('CHANGELOG.md').read()
          pattern = rf'\[{re.escape(\"$VERSION_NUM\")}\].*?(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          print(match.group(0).strip() if match else 'See CHANGELOG.md for details.')
          " 2>/dev/null || echo "See CHANGELOG.md for details.")
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "Ward Protocol ${{ steps.tag.outputs.TAG }}"
          body: |
            ${{ steps.changelog.outputs.NOTES }}

            ---
            **Install:** `pip install ward-protocol==${{ steps.tag.outputs.TAG }}`
            **Tests:** 204/204 Python · 40/40 Rust · 45/45 TypeScript
            **PyPI:** https://pypi.org/project/ward-protocol/
          files: dist/*
          draft: false
          prerelease: false
