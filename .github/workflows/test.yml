name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Lockdown default permissions
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install xrpl-py pydantic httpx pytest pytest-asyncio pytest-cov anyio[trio] "hypothesis>=6.0.0,<7.0.0"

      - name: Run unit tests with coverage
        run: |
          pytest test_ward.py tests/test_invariants_property.py tests/test_coverage_gaps.py -v -m "not integration" \
            --tb=short \
            --cov=ward \
            --cov-report=xml \
            --cov-report=term-missing
          pip install fastapi httpx
          pytest sdk/python/tests/ -v --tb=short

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy xrpl-py pydantic httpx bandit

      - name: Ruff lint
        run: ruff check ward/ --select=E,F,W,I --ignore=E501

      - name: Ruff format check
        run: ruff format ward/ --check

      - name: Mypy type check
        run: mypy ward/ --ignore-missing-imports
        continue-on-error: true

      - name: Security scan
        run: bandit -r ward/ -ll -q
        continue-on-error: true

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Run Rust tests
        working-directory: ward
        run: cargo test --all-features
      - name: Rust lint
        working-directory: ward
        run: cargo clippy

  tla-model-check:
    name: TLA+ Model Check (INV-007/016)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install TLC
        run: |
          wget -q https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Run TLC model checker
        run: |
          java -cp tla2tools.jar tlc2.TLC \
            -config docs/formal/ward_validator.cfg \
            docs/formal/ward_validator.tla

  signing-boundary-check:
    name: Signing Boundary Check (INV-003)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Run signing boundary static check
        run: python3 scripts/check_signing_boundary.py

  test-typescript:
    name: Test (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci
      - name: TypeScript type check
        working-directory: sdk/typescript
        run: npm run lint
      - name: Run TypeScript tests
        working-directory: sdk/typescript
        run: npm test
