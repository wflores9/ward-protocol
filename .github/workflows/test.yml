name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Lockdown default permissions
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install xrpl-py pydantic httpx pytest pytest-asyncio pytest-cov anyio[trio]

      - name: Run unit tests with coverage
        run: |
          pytest test_ward.py -v -m "not integration" \
            --tb=short \
            --cov=ward \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy xrpl-py pydantic httpx bandit

      - name: Ruff lint
        run: ruff check ward/ --select=E,F,W,I --ignore=E501

      - name: Ruff format check
        run: ruff format ward/ --check

      - name: Mypy type check
        run: mypy ward/ --ignore-missing-imports
        continue-on-error: true

      - name: Security scan
        run: bandit -r ward/ -ll -q
        continue-on-error: true
