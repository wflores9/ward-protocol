[build]
  command   = "npm run build"
  publish   = ".next"

[[headers]]
  for = "/*"

  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://s.altnet.rippletest.net https://xrplcluster.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' mailto:"

[[redirects]]
  from = "/certified"
  to = "/certified"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard"
  status = 200

[[plugins]]
  package = "@netlify/plugin-nextjs"
