# Legacy redirects
[[redirects]]
  from = "/flow"
  to = "/spec.html"
  status = 301

[[redirects]]
  from = "/flow.html"
  to = "/spec.html"
  status = 301

[[redirects]]
  from = "/topology"
  to = "/architecture.html"
  status = 301

[[redirects]]
  from = "/topology.html"
  to = "/architecture.html"
  status = 301

  # Security headers
  [[headers]]
    for = "/*"
      [headers.values]
          X-Frame-Options = "DENY"
              X-Content-Type-Options = "nosniff"
                  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
                      Referrer-Policy = "strict-origin-when-cross-origin"
                          Permissions-Policy = "geolocation=(), microphone=(), camera=()"
                              Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.wardprotocol.org"
