[pytest]
# ---------------------------------------------------------------------------
# Ward Protocol — pytest configuration
#
# NOTE: Coverage and marker config has been consolidated into pyproject.toml
# ([tool.pytest.ini_options] and [tool.coverage.*]).
# This file kept for editors/tools that do not read pyproject.toml.
# ---------------------------------------------------------------------------

# File/class/function discovery
python_files    = test_*.py
python_classes  = Test*
python_functions = test_*

# pytest-asyncio: auto mode — no @pytest.mark.asyncio needed
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Default run options
addopts =
    -v
    --cov=ward
    --cov-report=term-missing
    --strict-markers
    -m "not integration"

# Custom markers (must match pyproject.toml [tool.pytest.ini_options].markers)
markers =
    unit:        Unit tests — no XRPL network required
    integration: Integration tests — hit XRPL testnet (slow, requires network)
    slow:        Slow-running tests
