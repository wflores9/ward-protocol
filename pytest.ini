[pytest]
# Where to look for tests
# testpaths =
#     tests
#     sdk/python/tests

# File/class/function discovery patterns (keep these)
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Verbose output + coverage for the actual Ward code
addopts =
    -v
    --cov=ward_client
    --cov=ward
    --cov-report=term-missing
    --strict-markers

# Custom markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

# Coverage.py settings (recommended)
[run]
branch = true
omit =
    */tests/*
    */__init__.py
